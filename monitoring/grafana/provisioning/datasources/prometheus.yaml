# Grafana Datasource Provisioning — Auto-registers Prometheus on first boot.
# Docs: https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://harvestgate-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
