version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: harvestgate-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harvestgate-gateway
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - ONNX_MODEL_PATH=models/harvestml_simulator.onnx
      - PREPROCESSOR_PATH=models/simulator_preprocessor.joblib
      - BASELINE_STATS_PATH=drift/baseline_stats.json
      - PSI_THRESHOLD=0.25
      - CACHE_TTL_SECONDS=3600
    depends_on:
      - redis
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: harvestgate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: harvestgate-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
